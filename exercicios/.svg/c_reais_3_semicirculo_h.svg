<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- semi circulo -->
  <path fill="none" stroke="black" stroke-width="2px" d="M40,60 a300,300 0 0,1 300,300"/>

  <!-- eixo x -->
  <line x1="0" y1="360" x2="360" y2="360" stroke="black" marker-end="url(#arrow)" stroke-width="2px"/>
  <!-- legenda x -->
  <text x="20" y="70" font-size="20" fill="black">1</text>
  <!-- ponta x -->
  <polygon points="360,355 360,365 370, 360" style="fill:black;stroke:black;stroke-width:0"/>

  <!-- eixo y -->
  <line x1="40" y1="400" x2="40" y2="40" stroke="black" marker-end="url(#arrow)" stroke-width="2px"/>
  <!-- legenda y -->
  <text x="330" y="380" font-size="20" fill="black">1</text>
  <!-- ponta y -->
  <polygon points="45,40 35,40 40, 30" style="fill:black;stroke:black;stroke-width:0"/>

  <!-- H -->
  <text x="150" y="250" font-size="30" fill="black">H</text>
</svg>