<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- A marker to be used as an arrowhead -->
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="5"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <!-- semi circulo -->
  <path fill="none" stroke="black" stroke-width="2" d="M40,60 a300,300 0 0,1 300,300" />

  <!-- eixo x -->
  <line x1="0" y1="360" x2="360" y2="360" stroke="black" marker-end="url(#arrow)" />
  <!-- eixo y -->
  <line x1="40" y1="400" x2="40" y2="40" stroke="black" marker-end="url(#arrow)" />

  <!-- legenda x -->
  <text x="20" y="70" font-size="20" fill="black">1</text>
  <!-- legenda y -->
  <text x="330" y="380" font-size="20" fill="black">1</text>
  <!-- H -->
  <text x="150" y="250" font-size="30" fill="black">H</text>
</svg>
