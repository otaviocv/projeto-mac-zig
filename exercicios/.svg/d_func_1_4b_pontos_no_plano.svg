<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- eixo x -->
  <line x1="0" y1="360" x2="360" y2="360" stroke="black" marker-end="url(#arrow)" stroke-width="2px"/>
  <!-- ponta x -->
